name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # cada día a medianoche UTC
  workflow_dispatch:       # permite lanzarlo manualmente
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            snake.svg?palette=github-dark&color_snake=#22d3ee&color_dots=#0a0e1a,#164e63,#0891b2,#22d3ee,#a5f3fc

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
